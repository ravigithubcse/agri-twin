<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="shell__sidenav">
    <div class="shell__brand">
      <span class="shell__mark">AT</span>
      <span class="shell__brand-name">AGRI-TWIN</span>
    </div>

    <mat-nav-list class="shell__nav">
      @for (item of navItems; track item.route) {
        <a mat-list-item [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="shell__footer">
      <button mat-stroked-button (click)="logout()" class="shell__logout">
        <mat-icon>logout</mat-icon>
        Sign out
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="shell__toolbar">
      <span class="shell__toolbar-spacer"></span>
      @if (currentUser()) {
        <div class="shell__user">
          <span class="shell__user-name">{{ currentUser()!.fullName }}</span>
          <span class="shell__user-tier">{{ currentUser()!.tier }}</span>
        </div>
      }
    </mat-toolbar>

    <main class="shell__main">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
