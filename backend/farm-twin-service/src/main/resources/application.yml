spring:
  application:
    name: farm-twin-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agritwin_farmtwin}
    username: ${DB_USERNAME:agritwin}
    password: ${DB_PASSWORD:agritwin_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8082}
  error:
    include-message: always
    include-binding-errors: always

agritwin:
  jwt:
    # IMPORTANT: must match user-service's agritwin.jwt.secret in every environment.
    # This is a temporary shared-secret trust model for Module 1/2. The proper fix
    # (tracked for a later module) is for user-service to expose a JWKS endpoint
    # and switch both services to asymmetric (RS256) signing, so farm-twin-service
    # never needs to hold a secret capable of *issuing* tokens, only verifying them.
    secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-min-256-bits-long-xxxxxxxxxxxxxxxxxxxxxxxxxx}
    issuer: agritwin-ai

  services:
    user-service-url: ${USER_SERVICE_URL:http://localhost:8081}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.agritwin: INFO
    org.springframework.security: WARN
