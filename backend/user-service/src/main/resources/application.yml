spring:
  application:
    name: user-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agritwin_users}
    username: ${DB_USERNAME:agritwin}
    password: ${DB_PASSWORD:agritwin_dev_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8081}
  error:
    include-message: always
    include-binding-errors: always

agritwin:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-min-256-bits-long-xxxxxxxxxxxxxxxxxxxxxxxxxx}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 30
    issuer: agritwin-ai

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.agritwin: INFO
    org.springframework.security: WARN
