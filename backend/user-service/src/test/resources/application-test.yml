spring:
  datasource:
    url: jdbc:h2:mem:agritwin_users_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

agritwin:
  jwt:
    secret: test-only-secret-key-not-for-production-use-min-256-bits-xxxxxxxxxxxxxxxxxxx
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 30
    issuer: agritwin-ai-test
