name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        service: [user-service, farm-twin-service]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test ${{ matrix.service }}
        working-directory: backend
        run: mvn -B -pl ${{ matrix.service }} -am verify

      - name: Capture failure diagnostics to a branch
        if: failure()
        working-directory: backend
        run: |
          mkdir -p /tmp/ci-diagnostics
          OUT=/tmp/ci-diagnostics/${{ matrix.service }}-failure.txt
          echo "=== mvn -pl ${{ matrix.service }} -am verify (re-run for full output) ===" > "$OUT"
          mvn -B -pl ${{ matrix.service }} -am verify >> "$OUT" 2>&1 || true
          echo "" >> "$OUT"
          echo "=== Surefire .txt reports ===" >> "$OUT"
          for f in ${{ matrix.service }}/target/surefire-reports/*.txt; do
            if [ -f "$f" ]; then
              echo "--- $f ---" >> "$OUT"
              cat "$f" >> "$OUT"
            fi
          done

          git config --global user.email "ci@agritwin.local"
          git config --global user.name "AGRI-TWIN CI"
          git fetch origin ci-diagnostics 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/ci-diagnostics; then
            git checkout -B ci-diagnostics origin/ci-diagnostics
          else
            git checkout --orphan ci-diagnostics
            git rm -rf . > /dev/null 2>&1 || true
          fi
          mkdir -p ci-diagnostics
          cp "$OUT" "ci-diagnostics/${{ matrix.service }}-failure.txt"
          git add "ci-diagnostics/${{ matrix.service }}-failure.txt"
          git commit -m "ci: ${{ matrix.service }} failure diagnostics for run ${{ github.run_id }}" || true
          git push origin ci-diagnostics --force

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: backend/${{ matrix.service }}/target/surefire-reports/

      - name: Upload built jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: backend/${{ matrix.service }}/target/*.jar
